<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zephyr Eval Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --panel: #171d22;
        --panel-2: #20272e;
        --ink: #f4f7fb;
        --muted: #a7b4bf;
        --line: rgba(255, 255, 255, 0.1);
        --accent: #37d99e;
        --warn: #f4c95d;
        --danger: #f07c6c;
        --info: #76a9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #101418, #0b0f12);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        max-width: 1320px;
        margin: 0 auto;
        padding: 28px 22px 48px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 6px;
        font-size: 28px;
        letter-spacing: 0;
      }

      .subtitle {
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .nav a,
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 11px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
      }

      .pill {
        color: var(--accent);
        background: rgba(55, 217, 158, 0.08);
      }

      .toolbar,
      .grid,
      .split,
      .case-toolbar {
        display: grid;
        gap: 14px;
      }

      .toolbar {
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: end;
        margin-bottom: 16px;
      }

      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 16px;
      }

      .split {
        grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr);
        margin-bottom: 16px;
      }

      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel {
        padding: 18px;
      }

      .card {
        padding: 14px;
      }

      .card-label,
      label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .card-value {
        margin-top: 7px;
        font-size: 25px;
        font-weight: 900;
      }

      .card-note {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      input,
      select,
      button {
        border-radius: 8px;
        font: inherit;
      }

      input[type="file"],
      select {
        width: 100%;
        border: 1px solid var(--line);
        padding: 10px 11px;
        color: var(--ink);
        background: var(--panel-2);
      }

      button {
        border: 1px solid var(--line);
        padding: 10px 13px;
        color: var(--ink);
        background: var(--panel-2);
        font-weight: 850;
        cursor: pointer;
      }

      button.primary {
        border-color: transparent;
        background: var(--accent);
        color: #06120f;
      }

      .section-title {
        margin-bottom: 12px;
        font-size: 15px;
        font-weight: 900;
      }

      .bars {
        display: grid;
        gap: 10px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr) 48px;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
      }

      .bar-track {
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
      }

      .bar-fill {
        height: 100%;
        min-width: 2px;
        border-radius: 999px;
        background: var(--info);
      }

      .bar-fill.pass {
        background: var(--accent);
      }

      .bar-fill.partial {
        background: var(--warn);
      }

      .bar-fill.fail,
      .bar-fill.error {
        background: var(--danger);
      }

      .priority-list {
        display: grid;
        gap: 9px;
      }

      .priority-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px;
        background: rgba(255, 255, 255, 0.03);
      }

      .priority-title {
        font-weight: 900;
      }

      .priority-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .case-toolbar {
        grid-template-columns: minmax(0, 1fr) 180px;
        margin-bottom: 12px;
      }

      .case-list {
        display: grid;
        gap: 10px;
        max-height: 620px;
        overflow: auto;
        padding-right: 4px;
      }

      .case {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
      }

      .case-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .case-id {
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .status {
        white-space: nowrap;
        border-radius: 999px;
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .status.pass {
        color: var(--accent);
        background: rgba(55, 217, 158, 0.08);
      }

      .status.partial {
        color: var(--warn);
        background: rgba(244, 201, 93, 0.08);
      }

      .status.fail,
      .status.error {
        color: var(--danger);
        background: rgba(240, 124, 108, 0.08);
      }

      .case-question,
      .case-answer,
      .case-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .case-answer {
        color: #dce6ee;
      }

      .case-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .case-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        color: var(--accent);
        background: rgba(55, 217, 158, 0.07);
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
      }

      .case-action:hover {
        border-color: rgba(55, 217, 158, 0.5);
      }

      .empty {
        color: var(--muted);
        line-height: 1.5;
      }

      @media (max-width: 960px) {
        .topbar,
        .toolbar,
        .grid,
        .split,
        .case-toolbar {
          display: block;
        }

        .nav,
        .card,
        .panel,
        .toolbar > *,
        .case-toolbar > * {
          margin-top: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>Zephyr Eval Dashboard</h1>
          <p class="subtitle">
            Demo-only quality view for golden runs: pass rate, failure categories, grounding signals, latency, and token use.
          </p>
        </div>
        <nav class="nav" aria-label="Demo pages">
          <a href="/">Chat UI</a>
          <a href="/demo.html">Charts Demo</a>
          <span class="pill">Evaluation layer only</span>
        </nav>
      </header>

      <section class="toolbar panel">
        <div>
          <label for="evalFile">Load Eval JSON</label>
          <input id="evalFile" type="file" accept=".json,application/json" />
        </div>
        <button id="loadBundledBtn" type="button">Bundled Snapshot</button>
        <button class="primary" id="tryFetchBtn" type="button">Try Latest Path</button>
      </section>

      <section class="grid" id="summaryCards"></section>

      <section class="split">
        <section class="panel">
          <h2 class="section-title">Breakdown</h2>
          <div class="bars" id="breakdownBars"></div>
        </section>
        <section class="panel">
          <h2 class="section-title">What To Fix Next</h2>
          <div class="priority-list" id="priorityList"></div>
        </section>
      </section>

      <section class="panel">
        <h2 class="section-title">Cases</h2>
        <div class="case-toolbar">
          <select id="caseFilter">
            <option value="all">All cases</option>
            <option value="non-pass">Non-pass only</option>
            <option value="pass">Pass</option>
            <option value="partial">Partial</option>
            <option value="fail">Fail</option>
          </select>
          <select id="caseSort">
            <option value="status">Sort by status</option>
            <option value="latency">Sort by latency</option>
            <option value="tokens">Sort by tokens</option>
            <option value="id">Sort by id</option>
          </select>
        </div>
        <div class="case-list" id="caseList"></div>
      </section>
    </main>

    <script src="/eval_dashboard.js"></script>
  </body>
</html>
